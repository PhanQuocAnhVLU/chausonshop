<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg21" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#01579b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0277bd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card21" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bg21)" rx="12"/>

  <!-- Pattern dots -->
  <circle cx="20" cy="20" r="40" fill="rgba(255,255,255,0.05)"/>
  <circle cx="280" cy="280" r="60" fill="rgba(255,255,255,0.05)"/>
  <circle cx="270" cy="30" r="30" fill="rgba(255,255,255,0.05)"/>
  <circle cx="30" cy="270" r="25" fill="rgba(255,255,255,0.05)"/>

  <!-- Card -->
  <rect x="30" y="30" width="240" height="240" fill="url(#card21)" rx="10" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Emoji icon -->
  <text x="150" y="135" font-size="72" text-anchor="middle" dominant-baseline="middle">💧</text>

  <!-- Product line 1 -->
  <text x="150" y="182" font-size="17" font-weight="bold" font-family="Arial,sans-serif"
    text-anchor="middle" fill="white" letter-spacing="0.5">Chacott</text>

  <!-- Product line 2 -->
  <text x="150" y="202" font-size="17" font-weight="bold" font-family="Arial,sans-serif"
    text-anchor="middle" fill="white" letter-spacing="0.5">Cleansing Water</text>

  <!-- Sub label -->
  <text x="150" y="228" font-size="11.5" font-family="Arial,sans-serif"
    text-anchor="middle" fill="rgba(255,255,255,0.80)">Nước Tẩy Trang Nhật</text>

  <!-- ID badge -->
  <rect x="12" y="12" width="36" height="20" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="30" y="26" font-size="10" font-family="Arial,sans-serif"
    text-anchor="middle" fill="rgba(255,255,255,0.9)" font-weight="bold">#21</text>
</svg>