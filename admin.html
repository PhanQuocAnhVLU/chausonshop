<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Quản trị — Châu Sơn Shop</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🌿 Châu Sơn Shop</h1>
    <p class="sub">Đăng nhập trang quản trị</p>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="loginEmail" required placeholder="admin@example.com">
      <label>Mật khẩu</label>
      <input type="password" id="loginPassword" required placeholder="••••••••">
      <button type="submit">Đăng nhập</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<!-- ===================== DASHBOARD ===================== -->
<div id="dashboardScreen">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>🌿 Châu Sơn Shop</h2>
      <div class="tag">Trang quản trị</div>

      <div class="admin-nav-item active" data-view="overview" onclick="switchView('overview')">📊 Tổng quan</div>
      <div class="admin-nav-item" data-view="orders" onclick="switchView('orders')">🧾 Đơn hàng</div>
      <div class="admin-nav-item" data-view="products" onclick="switchView('products')">📦 Sản phẩm</div>
      <div class="admin-nav-item" data-view="visitors" onclick="switchView('visitors')">👀 Khách truy cập</div>
      <div class="admin-nav-item" data-view="content" onclick="switchView('content')">🛍️ Nội dung</div>

      <div class="admin-logout" onclick="logout()">↩ Đăng xuất</div>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1 id="pageTitle">Tổng quan</h1>
        <div class="user-email" id="userEmail"></div>
      </div>

      <div class="admin-view active" id="view-overview"></div>
      <div class="admin-view" id="view-orders"></div>
      <div class="admin-view" id="view-products"></div>
      <div class="admin-view" id="view-visitors"></div>
      <div class="admin-view" id="view-content"></div>
    </main>
  </div>
</div>

<!-- ===================== MODAL ===================== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBoxContent"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="js/data.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
